<!DOCTYPE html>
<html>
<head>
    <title>Form Biodata Hosting</title>
</head>
<body>

<h2>Form Biodata</h2>

<form id="formBiodata">
    Nama Lengkap:<br>
    <input type="text" id="nama" required><br><br>

    Kelas:<br>
    <input type="text" id="kelas" required><br><br>

    Alamat:<br>
    <textarea id="alamat" required></textarea><br><br>

    Tanggal Lahir:<br>
    <input type="date" id="tanggal_lahir" required><br><br>

    <button type="submit">Simpan</button>
</form>

<h3>Hasil:</h3>
<p id="output"></p>

<hr>
<h3>Link Soal 1 & 2</h3>
<p>
    Screenshot dan penjelasan Soal 1 & 2 dilampirkan di laporan.
</p>

<script>
document.getElementById("formBiodata").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let kelas = document.getElementById("kelas").value;
    let alamat = document.getElementById("alamat").value;
    let tanggal = document.getElementById("tanggal_lahir").value;

    let today = new Date();
    let birthDate = new Date(tanggal);
    let umur = today.getFullYear() - birthDate.getFullYear();

    document.getElementById("output").innerHTML =
        "Nama: " + nama + "<br>" +
        "Kelas: " + kelas + "<br>" +
        "Alamat: " + alamat + "<br>" +
        "Umur: " + umur + " tahun";
});
</script>

</body>
</html>
